<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <style>
    /* Mimic default browser blank page */
    :root {
      --bg: #202124; /* Chrome dark mode default new tab color */
      --widget-bg: #292a2d;
      --widget-border: #3c4043;
      --text: #e8eaed;
      --text-dim: #9aa0a6;
      --accent: #8ab4f8;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --widget-bg: #ffffff;
        --widget-border: #dadce0;
        --text: #202124;
        --text-dim: #5f6368;
        --accent: #1a73e8;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      margin: 0;
    }

    /* Compact corner widget */
    .widget-box {
      width: min(360px, calc(100vw - 24px));
      min-height: 96px;
      background: var(--widget-bg);
      border: 1px solid var(--widget-border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      padding: 10px 12px;
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 6px;
    }

    #mystery-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
    }

    #decrypt-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      animation: pulse 1s infinite alternate;
    }

    #scan-line {
      width: 80px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      animation: scan 1.5s infinite ease-in-out;
    }

    #headline-card {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s ease;
      display: none;
    }

    #headline-card.visible {
      opacity: 1;
      transform: translateY(0);
      display: block;
    }

    #headline-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .meta-source { color: var(--accent); }
    .meta-sep { margin: 0 6px; opacity: 0.5; }
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .lane-toggle {
      display: inline-flex;
      border: 1px solid var(--widget-border);
      border-radius: 999px;
      overflow: hidden;
    }

    .lane-btn {
      border: 0;
      background: transparent;
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 7px;
      cursor: pointer;
    }

    .lane-btn.active {
      background: var(--accent);
      color: #fff;
    }

    #headline-link {
      text-decoration: none;
      color: var(--text);
    }

    #headline-text {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 16px;
      line-height: 1.25;
      transition: color 0.2s;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #headline-link:hover #headline-text {
      color: var(--accent);
    }

    #setup-guide {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
    }

    @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    @keyframes scan { 
      0% { transform: translateX(-40px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(40px); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Small floating widget; rest of tab stays clean -->
  <div class="widget-box">
    <div id="mystery-box">
      <div id="decrypt-text">FETCHING INTEL...</div>
      <div id="scan-line"></div>
    </div>
    
    <div id="headline-card">
      <div class="meta-row">
        <div id="headline-meta"></div>
        <div class="lane-toggle" aria-label="Select lane">
          <button id="lane-general" class="lane-btn" type="button">General</button>
          <button id="lane-expert" class="lane-btn" type="button">Expert</button>
        </div>
      </div>
      <a id="headline-link" href="#" target="_blank">
        <h1 id="headline-text"></h1>
      </a>
    </div>

    <div id="setup-guide" hidden>
      Recon daemon offline
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
